services:
  api:
    build:
      context: ./api

    container_name: ylff-api

    restart: unless-stopped

    env_file:
      - ./api/.env

    ports:
      - "127.0.0.1:8003:8003"

    volumes:
      - ./api:/app

    working_dir: /app

    command: ["uv", "run", "--python", "/usr/local/bin/python3.14", "python", "app.py"]
